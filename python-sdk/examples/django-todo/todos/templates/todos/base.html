<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Todo + Arguslog Demo{% endblock %}</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --primary: #6366f1;
      --primary-hover: #4f46e5;
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
      --info: #3b82f6;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    .container { max-width: 980px; margin: 0 auto; padding: 24px; }
    header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 0; border-bottom: 1px solid var(--border); margin-bottom: 24px;
    }
    header h1 { margin: 0; font-size: 22px; }
    header nav a {
      color: var(--muted); text-decoration: none; margin-left: 16px; font-size: 14px;
    }
    header nav a:hover { color: var(--text); }
    .card {
      background: var(--card); border: 1px solid var(--border); border-radius: 8px;
      padding: 20px; margin-bottom: 16px;
    }
    .form-input {
      display: block; width: 100%; padding: 10px 12px; margin-bottom: 12px;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-size: 14px; font-family: inherit;
    }
    .form-input:focus { outline: 2px solid var(--primary); border-color: var(--primary); }
    .btn {
      display: inline-block; padding: 8px 16px; border-radius: 6px;
      background: var(--primary); color: white; border: none; cursor: pointer;
      font-size: 14px; text-decoration: none; font-family: inherit;
    }
    .btn:hover { background: var(--primary-hover); }
    .btn-danger { background: var(--danger); }
    .btn-warning { background: var(--warning); color: #0f172a; }
    .btn-info { background: var(--info); }
    .btn-success { background: var(--success); }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-sm { padding: 4px 10px; font-size: 12px; }
    .todos { list-style: none; padding: 0; margin: 0; }
    .todo {
      display: flex; align-items: center; gap: 12px;
      padding: 12px; border-bottom: 1px solid var(--border);
    }
    .todo:last-child { border-bottom: none; }
    .todo.done .todo-title { text-decoration: line-through; color: var(--muted); }
    .todo-title { flex: 1; font-weight: 500; }
    .todo-desc { color: var(--muted); font-size: 13px; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 999px;
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .badge-high { background: #7f1d1d; color: #fecaca; }
    .badge-medium { background: #78350f; color: #fde68a; }
    .badge-low { background: #14532d; color: #bbf7d0; }
    .messages { margin-bottom: 16px; }
    .alert {
      padding: 10px 14px; border-radius: 6px; margin-bottom: 8px; font-size: 14px;
    }
    .alert-success { background: #064e3b; color: #d1fae5; }
    .alert-error { background: #7f1d1d; color: #fee2e2; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 12px; }
    .grid .btn { text-align: left; }
    h2 { margin-top: 0; font-size: 18px; }
    .meta { color: var(--muted); font-size: 12px; margin-top: 4px; }
    code { background: var(--bg); padding: 2px 6px; border-radius: 4px; font-size: 13px; }
    .pill { font-size: 11px; padding: 2px 8px; background: var(--bg); border-radius: 999px; color: var(--muted); }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Todo + Arguslog SDK</h1>
      <nav>
        <a href="{% url 'todo_list' %}">Todos</a>
        <a href="{% url 'demo_index' %}">SDK Demos</a>
        <a href="{% url 'demo_client' %}">Client info</a>
      </nav>
    </header>

    {% if messages %}
      <div class="messages">
        {% for m in messages %}
          <div class="alert alert-{{ m.tags|default:'success' }}">{{ m }}</div>
        {% endfor %}
      </div>
    {% endif %}

    {% block content %}{% endblock %}
  </div>
</body>
</html>
