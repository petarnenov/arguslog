spring:
  application:
    name: arguslog-worker
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arguslog}
    username: ${DATABASE_USER:arguslog}
    password: ${DATABASE_PASSWORD:arguslog}
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  flyway:
    enabled: false # api owns migrations
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8082}
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

arguslog:
  # Dogfood — see services/api/src/main/resources/application.yml for rationale.
  dsn: ${ARGUSLOG_DSN:}
  environment: ${ARGUSLOG_ENVIRONMENT:dev}
  release: ${ARGUSLOG_RELEASE:0.0.1-SNAPSHOT}
  worker:
    stream-key: events:incoming
    consumer-group: worker
    consumer-name: ${HOSTNAME:worker-1}
    batch-size: 50
    poll-timeout-ms: 1000
  retention:
    # Safety default — first deploy logs scope without mutating data. Flip to false after one
    # cycle confirms the count is sane.
    dry-run: ${RETENTION_DRY_RUN:true}
    batch-size: ${RETENTION_BATCH_SIZE:10000}
    cron: ${RETENTION_CRON:0 0 3 * * *}
  billing:
    # 04:00 UTC sits an hour after the retention job — keeps the two daily passes from
    # competing for connection-pool slots on a small Railway box.
    downgrade-cron: ${BILLING_DOWNGRADE_CRON:0 0 4 * * *}
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    bucket: ${R2_BUCKET:arguslog-sourcemaps}
    access-key: ${R2_ACCESS_KEY:minioadmin}
    secret-key: ${R2_SECRET_KEY:minioadmin}
  alerts:
    telegram:
      bot-token: ${TELEGRAM_BOT_TOKEN:}
    email:
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:alerts@arguslog.org}
      dashboard-base-url: ${ALERTS_DASHBOARD_BASE_URL:http://localhost:5173}

logging:
  level:
    root: INFO
    org.arguslog: INFO
