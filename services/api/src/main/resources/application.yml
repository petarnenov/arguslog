spring:
  application:
    name: arguslog-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arguslog}
    username: ${DATABASE_USER:arguslog}
    password: ${DATABASE_PASSWORD:arguslog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://${DEV_HOST:localhost}:8180/realms/arguslog}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8081}
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

arguslog:
  cors:
    # ${DEV_HOST:localhost} resolves to whatever the dev machine's LAN IP is (or localhost when
    # unset) so a phone or second laptop loading the dashboard at http://192.168.x.y:5173 isn't
    # blocked by CORS. CORS_ORIGINS, when set, replaces the whole list — used in prod to lock
    # down to app.arguslog.org only.
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://${DEV_HOST:localhost}:5173}
  ingest:
    # Used to render DSN strings in /projects/{id}/keys responses. The DSN points clients at the
    # ingest service, not the api — set INGEST_PUBLIC_HOST in production to your ingest hostname.
    public-host: ${INGEST_PUBLIC_HOST:http://${DEV_HOST:localhost}:8080}
  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    # Stripe price id for the Pro tier — pulled from env so test + live mode use different
    # objects without a code change. Empty until Stripe is provisioned.
    price-pro-id: ${STRIPE_PRICE_PRO:}
    # Where Stripe redirects after Checkout / Customer Portal — points at the dashboard.
    dashboard-base-url: ${DASHBOARD_BASE_URL:http://${DEV_HOST:localhost}:5173}
  nowpayments:
    # NOWPayments crypto checkout (Phase 2 secondary provider). Empty until production secrets
    # are wired in Railway env vars. Endpoints short-circuit to 503 when unconfigured.
    api-key: ${NOWPAYMENTS_API_KEY:}
    ipn-secret: ${NOWPAYMENTS_IPN_SECRET:}
    public-key: ${NOWPAYMENTS_PUBLIC_KEY:}
    api-base-url: ${NOWPAYMENTS_API_BASE_URL:https://api.nowpayments.io/v1}
    dashboard-base-url: ${DASHBOARD_BASE_URL:http://${DEV_HOST:localhost}:5173}
    # Public URL NOWPayments will POST IPN events to. Configure the same value in the
    # NOWPayments dashboard's Store Settings → IPN Callback URL.
    ipn-callback-url: ${NOWPAYMENTS_IPN_CALLBACK_URL:https://api.arguslog.org/api/v1/webhooks/nowpayments}
  billing:
    # ISO-8601 duration. 7 days matches industry norms (GitHub, Vercel) and is short enough
    # to bound disk burn from a customer with a permanently broken card.
    grace-period: ${BILLING_GRACE_PERIOD:P7D}
  ratelimit:
    # Per-instance Bucket4j on every /api/** request. Two tiers — DEFAULT for the dashboard
    # surface, STRICT for public webhook endpoints (lower cost, lower legitimate cadence).
    enabled: ${RATELIMIT_ENABLED:true}
    default:
      tokens: ${RATELIMIT_DEFAULT_TOKENS:600}
      window: ${RATELIMIT_DEFAULT_WINDOW:PT1M}
    strict:
      tokens: ${RATELIMIT_STRICT_TOKENS:30}
      window: ${RATELIMIT_STRICT_WINDOW:PT1M}
  # Dogfood — when ARGUSLOG_DSN is set the SDK auto-init forwards ERROR-level Logback events
  # back into Arguslog itself. Empty in dev/test → SDK is a no-op so log lines stay local.
  dsn: ${ARGUSLOG_DSN:}
  environment: ${ARGUSLOG_ENVIRONMENT:dev}
  release: ${ARGUSLOG_RELEASE:0.0.1-SNAPSHOT}
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    bucket: ${R2_BUCKET:arguslog-sourcemaps}
    access-key: ${R2_ACCESS_KEY:minioadmin}
    secret-key: ${R2_SECRET_KEY:minioadmin}
  invites:
    # Resend HTTP API used to notify org-invitees. Reuses RESEND_API_KEY/RESEND_FROM that are
    # already provisioned for alert delivery. apiKey blank → log-and-drop (membership row is
    # still inserted, invitee can still log in, just no email).
    email:
      api-base-url: ${INVITE_EMAIL_API_URL:https://api.resend.com}
      api-key: ${RESEND_API_KEY:}
      from: ${RESEND_FROM:noreply@arguslog.local}
      dashboard-base-url: ${DASHBOARD_BASE_URL:http://${DEV_HOST:localhost}:5173}
      timeout: 5s

logging:
  level:
    root: INFO
    org.arguslog: INFO
