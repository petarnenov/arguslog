spring:
  application:
    name: arguslog-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arguslog}
    username: ${DATABASE_USER:arguslog}
    password: ${DATABASE_PASSWORD:arguslog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/arguslog}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8081}
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

arguslog:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  ingest:
    # Used to render DSN strings in /projects/{id}/keys responses. The DSN points clients at the
    # ingest service, not the api — set INGEST_PUBLIC_HOST in production to your ingest hostname.
    public-host: ${INGEST_PUBLIC_HOST:http://localhost:8080}
  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    # Stripe price id for the Pro tier — pulled from env so test + live mode use different
    # objects without a code change. Empty until Stripe is provisioned.
    price-pro-id: ${STRIPE_PRICE_PRO:}
    # Where Stripe redirects after Checkout / Customer Portal — points at the dashboard.
    dashboard-base-url: ${DASHBOARD_BASE_URL:http://localhost:5173}
  billing:
    # ISO-8601 duration. 7 days matches industry norms (GitHub, Vercel) and is short enough
    # to bound disk burn from a customer with a permanently broken card.
    grace-period: ${BILLING_GRACE_PERIOD:P7D}
  # Dogfood — when ARGUS_DSN is set the SDK auto-init forwards ERROR-level Logback events
  # back into Arguslog itself. Empty in dev/test → SDK is a no-op so log lines stay local.
  dsn: ${ARGUS_DSN:}
  environment: ${ARGUS_ENVIRONMENT:dev}
  release: ${ARGUS_RELEASE:0.0.1-SNAPSHOT}
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    bucket: ${R2_BUCKET:arguslog-sourcemaps}
    access-key: ${R2_ACCESS_KEY:minioadmin}
    secret-key: ${R2_SECRET_KEY:minioadmin}

logging:
  level:
    root: INFO
    org.arguslog: INFO
