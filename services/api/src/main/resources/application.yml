spring:
  application:
    name: arguslog-api
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arguslog}
    username: ${DATABASE_USER:arguslog}
    password: ${DATABASE_PASSWORD:arguslog}
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate.jdbc.time_zone: UTC
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration
    schemas: public
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER:http://localhost:8180/realms/arguslog}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8081}
  shutdown: graceful

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

arguslog:
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173}
  ingest:
    # Used to render DSN strings in /projects/{id}/keys responses. The DSN points clients at the
    # ingest service, not the api — set INGEST_PUBLIC_HOST in production to your ingest hostname.
    public-host: ${INGEST_PUBLIC_HOST:http://localhost:8080}
  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
  r2:
    endpoint: ${R2_ENDPOINT:http://localhost:9000}
    bucket: ${R2_BUCKET:arguslog-sourcemaps}
    access-key: ${R2_ACCESS_KEY:minioadmin}
    secret-key: ${R2_SECRET_KEY:minioadmin}

logging:
  level:
    root: INFO
    org.arguslog: INFO
