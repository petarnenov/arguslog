# Railway service config for arguslog-api. Built with the repo's Dockerfile so the runtime image
# is identical to local docker-compose; build context is the repo root (Gradle multi-module needs
# settings.gradle.kts + buildSrc + the version catalog).

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/api/Dockerfile"
# Scope "redeploy on push" to the files this service actually depends on. Touching apps/web or
# services/worker/ should not trigger an api rebuild.
watchPatterns = [
  "services/api/**",
  "java-sdk/**",
  "buildSrc/**",
  "settings.gradle.kts",
  "build.gradle.kts",
  "gradle/libs.versions.toml",
]

[deploy]
healthcheckPath = "/actuator/health/readiness"
# Spring Boot + Flyway cold start can take ~60s; bump if migrations grow.
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
