spring:
  application:
    name: arguslog-ingest
  threads:
    virtual:
      enabled: true
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/arguslog}
    username: ${DATABASE_USER:arguslog}
    password: ${DATABASE_PASSWORD:arguslog}
    hikari:
      maximum-pool-size: 8
      minimum-idle: 2
      connection-timeout: 5000
      pool-name: arguslog-ingest-pool
  flyway:
    enabled: false
  data:
    redis:
      url: ${REDIS_URL:redis://localhost:6379}
  jackson:
    default-property-inclusion: non_null

server:
  port: ${PORT:8080}
  shutdown: graceful
  servlet:
    encoding:
      charset: UTF-8

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

arguslog:
  # Dogfood — see services/api/src/main/resources/application.yml for rationale.
  dsn: ${ARGUSLOG_DSN:}
  environment: ${ARGUSLOG_ENVIRONMENT:dev}
  release: ${ARGUSLOG_RELEASE:0.0.1-SNAPSHOT}
  ingest:
    stream-key: events:incoming
    max-payload-bytes: 204800
  rate-limit:
    requests-per-second: 50
    burst: 100

logging:
  level:
    root: INFO
    org.arguslog: INFO
