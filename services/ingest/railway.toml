# Railway service config for arguslog-ingest. See services/api/railway.toml for rationale.

[build]
builder = "DOCKERFILE"
dockerfilePath = "services/ingest/Dockerfile"
watchPatterns = [
  "services/ingest/**",
  "java-sdk/**",
  "buildSrc/**",
  "settings.gradle.kts",
  "build.gradle.kts",
  "gradle/libs.versions.toml",
]

[deploy]
healthcheckPath = "/actuator/health/readiness"
healthcheckTimeout = 180
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
numReplicas = 1
