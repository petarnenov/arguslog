# Arguslog Keycloak theme — login flow only.
#
# parent=keycloak inherits all FreeMarker templates + base styles, so we only ship the things
# we want to override: our logo, font, brand colors. No .ftl files in this theme means every
# template comes from the parent and we never have to keep them in sync after KC version bumps.
#
# styles = the CSS files that get linked into <head>. Listed AFTER the parent's stylesheets so
# our rules override Keycloak's PatternFly defaults.

parent=keycloak
import=common/keycloak

styles=css/login.css

# Force a recognisable accent across icons / inputs / focus rings. KC reads this for primary
# button colors when the template doesn't hardcode them.
locales=en
