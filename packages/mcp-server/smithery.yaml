# Smithery server manifest. Smithery (https://smithery.ai) consumes this file to provide
# an in-platform launcher for the MCP server — users can point their Claude Desktop / Cursor
# at Smithery and have @arguslog/mcp-server auto-installed without editing config files
# locally.
#
# Smithery also derives the README and tool list from npm + this file; keep `displayName`
# and the configSchema in sync with the package.json description and the env vars the
# stdio bootstrap reads.

startCommand:
  type: stdio
  configSchema:
    type: object
    title: "Arguslog MCP server"
    properties:
      pat:
        type: string
        title: "Personal Access Token"
        description: |
          Generate one from your Arguslog dashboard → "Personal access tokens" page.
          Format: arglog_pat_… The PAT's scopes determine which tools the agent can
          actually invoke (read tools always work; writes require the matching scope
          like orgs:write or releases:write).
        format: password
      apiUrl:
        type: string
        title: "API base URL"
        description: |
          Override only for self-hosted Arguslog or a staging environment. Production
          customers should leave this blank to use https://api.arguslog.org.
        default: "https://api.arguslog.org"
    required:
      - pat
  commandFunction: |-
    (config) => ({
      command: 'node',
      args: ['dist/index.js'],
      env: {
        ARGUSLOG_PAT: config.pat,
        ARGUSLOG_API_URL: config.apiUrl || 'https://api.arguslog.org',
      },
    })
