name: Release sdk-web3

# Tag-driven npm release. Push a tag matching `sdk-web3-v*` and the matching version in
# packages/sdk-web3/package.json gets published. Depends on sdk-browser (which in turn
# depends on sdk-core), so both must already be on npm before tagging.
on:
  push:
    tags:
      - 'sdk-web3-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (sdk-web3-vX.Y.Z).'
        required: true
      dry-run:
        description: 'Run pnpm publish with --dry-run (no upload).'
        required: false
        default: 'true'

concurrency:
  group: release-sdk-web3-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          node scripts/verify-tag-version.mjs \
            "${{ steps.tag.outputs.value }}" \
            sdk-web3 \
            packages/sdk-web3/package.json

      - name: Build workspace dependencies
        run: |
          pnpm --filter @arguslog/sdk-core build
          pnpm --filter @arguslog/sdk-browser build

      - name: Lint, typecheck, test
        run: |
          pnpm --filter @arguslog/sdk-web3 lint
          pnpm --filter @arguslog/sdk-web3 typecheck
          pnpm --filter @arguslog/sdk-web3 test

      - name: Build
        run: pnpm --filter @arguslog/sdk-web3 build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          pnpm --filter @arguslog/sdk-web3 publish \
            --access public \
            --no-git-checks \
            --provenance \
            $DRY_RUN_FLAG
