name: PR

# Path filters trim CI cost: docs-only changes skip the whole workflow at the top level,
# and the per-language jobs are further gated by the `changes` detector below so a Python
# README touch doesn't pay for the 30-min Java Gradle build.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      js: ${{ steps.filter.outputs.js }}
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # Each job below runs only when its filter matches. `services/**` belongs to
          # `java` because the JVM backend lives there; OpenAPI overlaps because the spec
          # is generated by the api Gradle test.
          filters: |
            js:
              - 'apps/**'
              - 'packages/**'
              - 'cli/**'
              - 'e2e/**'
              - 'scripts/**'
              - 'tools/**'
              - 'pacts/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - '.github/workflows/pr.yml'
            python:
              - 'python-sdk/**'
              - '.github/workflows/pr.yml'
            java:
              - 'java-sdk/**'
              - 'services/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'buildSrc/**'
              - 'lib/**'
              - '.github/workflows/pr.yml'
            openapi:
              - 'services/api/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'buildSrc/**'
              - '.github/workflows/pr.yml'

  js:
    name: JS — lint, typecheck, test
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - name: Regenerate Pact contracts (sdk-browser → ingest)
        run: pnpm --filter @arguslog/sdk-browser test:pact
      - name: Verify committed Pacts match the SDK
        run: |
          if ! git diff --exit-code pacts/; then
            echo "::error::pacts/ drifted — the sdk-browser contract changed but the committed Pact JSON is stale."
            echo "Run 'pnpm --filter @arguslog/sdk-browser test:pact' locally and commit the diff."
            exit 1
          fi
      - name: Regenerate MCP tool catalog from openapi.json
        # The catalog (src/generated/openapi-tools.ts + version.ts) is checked in so other
        # tooling can resolve types without running codegen first. This step re-derives it
        # from services/api/openapi.json + packages/mcp-server/package.json; the diff check
        # below fails the PR if either the spec or curated-tools.ts changed without the
        # catalog being re-generated.
        run: pnpm --filter @arguslog/mcp-server generate
      - name: Verify committed MCP catalog matches openapi.json
        run: |
          if ! git diff --exit-code packages/mcp-server/src/generated/; then
            echo "::error::packages/mcp-server/src/generated/ drifted — openapi.json or curated-tools.ts changed but the generated catalog is stale."
            echo "Run 'pnpm --filter @arguslog/mcp-server generate' locally and commit the diff."
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: js-coverage
          path: |
            apps/*/coverage
            packages/*/coverage

  python:
    name: Python — lint + test
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python-sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install package with dev extras
        run: uv pip install --system -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: pytest
        run: pytest --cov=arguslog --cov-report=term

  java:
    name: Java — build + test
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Build & test
        run: ./gradlew build --stacktrace
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gradle-reports
          path: |
            **/build/reports/**
            **/build/test-results/**

  security:
    name: Security — gitleaks + trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # We run the gitleaks binary directly instead of `gitleaks/gitleaks-action`. The wrapper
    # action adds: PR commit-range computation, GitHub annotations, optional SARIF upload —
    # none of which are load-bearing for our flow (the binary's stdout/stderr is already in
    # the job log, and a non-zero exit fails the build). Dropping the wrapper:
    #   1. Removes a Node.js JS action from our supply chain (we no longer hand GITHUB_TOKEN
    #      to third-party JS code on every PR).
    #   2. Decouples us from the action's runtime — the wrapper still ships Node 20 with no
    #      v3 release in sight; the Go binary doesn't care.
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
        with:
          # For PR scans we diff `base..HEAD`; for push scans we use `before..HEAD`. Both need
          # the merge-base / previous SHA reachable from the local clone, which the default
          # shallow checkout (depth=1) doesn't have. Full history is the simplest correct
          # answer for a job that runs at most once per PR.
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: gitleaks scan
        env:
          # On PRs we scan only the diff between the PR base and HEAD — keeps the run fast
          # and the failure pointed at the offending commit. On push (e.g. merge to main)
          # we scan the diff since `before`, falling back to the full tree when `before` is
          # the all-zero SHA (initial push to a new branch).
          BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
        run: |
          set -euo pipefail
          if [ -n "${BASE_SHA:-}" ] && [ "${BASE_SHA}" != "0000000000000000000000000000000000000000" ]; then
            echo "▶ Scanning commits ${BASE_SHA}..HEAD"
            gitleaks git --log-opts="${BASE_SHA}..HEAD" --redact --verbose --exit-code 1
          else
            echo "▶ Scanning full working tree (no base SHA available)"
            gitleaks detect --source . --redact --verbose --exit-code 1
          fi
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  openapi-diff:
    name: OpenAPI spec stability
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Regenerate OpenAPI spec
        # OpenApiContractTest hits /v3/api-docs and asserts the result matches the committed
        # services/api/openapi.json byte-for-byte. A drift fails the test and writes the new
        # spec to services/api/build/openapi/openapi.json, which the upload below preserves.
        run: ./gradlew :services:api:test --tests
          "org.arguslog.api.openapi.OpenApiContractTest"
      - name: Verify committed spec matches the api
        if: always()
        run: |
          if [ -f services/api/build/openapi/openapi.json ]; then
            echo "::error::services/api/openapi.json drifted from /v3/api-docs."
            echo "Regenerate locally with:"
            echo "  ARGUSLOG_OPENAPI_WRITE=true ./gradlew :services:api:test --tests org.arguslog.api.openapi.OpenApiContractTest"
            echo "and commit services/api/openapi.json."
            diff -u services/api/openapi.json services/api/build/openapi/openapi.json || true
            exit 1
          fi
      - name: Upload generated spec
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: openapi-spec
          path: |
            services/api/openapi.json
            services/api/build/openapi/openapi.json
