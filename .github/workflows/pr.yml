name: PR

# Path filters trim CI cost: docs-only changes skip the whole workflow at the top level,
# and the per-language jobs are further gated by the `changes` detector below so a Python
# README touch doesn't pay for the 30-min Java Gradle build.
on:
  pull_request:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'
  push:
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - 'docs/**'

concurrency:
  group: pr-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect change scope
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      js: ${{ steps.filter.outputs.js }}
      python: ${{ steps.filter.outputs.python }}
      java: ${{ steps.filter.outputs.java }}
      openapi: ${{ steps.filter.outputs.openapi }}
    steps:
      - uses: actions/checkout@v5
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          # Each job below runs only when its filter matches. `services/**` belongs to
          # `java` because the JVM backend lives there; OpenAPI overlaps because the spec
          # is generated by the api Gradle test.
          filters: |
            js:
              - 'apps/**'
              - 'packages/**'
              - 'cli/**'
              - 'e2e/**'
              - 'scripts/**'
              - 'tools/**'
              - 'pacts/**'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'turbo.json'
              - '.github/workflows/pr.yml'
            python:
              - 'python-sdk/**'
              - '.github/workflows/pr.yml'
            java:
              - 'java-sdk/**'
              - 'services/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'gradle/**'
              - 'gradlew'
              - 'gradlew.bat'
              - 'buildSrc/**'
              - 'lib/**'
              - '.github/workflows/pr.yml'
            openapi:
              - 'services/api/**'
              - 'build.gradle.kts'
              - 'settings.gradle.kts'
              - 'buildSrc/**'
              - '.github/workflows/pr.yml'

  js:
    name: JS — lint, typecheck, test
    needs: changes
    if: needs.changes.outputs.js == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm format:check
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test:coverage
      - name: Regenerate Pact contracts (sdk-browser → ingest)
        run: pnpm --filter @arguslog/sdk-browser test:pact
      - name: Verify committed Pacts match the SDK
        run: |
          if ! git diff --exit-code pacts/; then
            echo "::error::pacts/ drifted — the sdk-browser contract changed but the committed Pact JSON is stale."
            echo "Run 'pnpm --filter @arguslog/sdk-browser test:pact' locally and commit the diff."
            exit 1
          fi
      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: js-coverage
          path: |
            apps/*/coverage
            packages/*/coverage

  python:
    name: Python — lint + test
    needs: changes
    if: needs.changes.outputs.python == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: python-sdk
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Install package with dev extras
        run: uv pip install --system -e ".[dev]"
      - name: ruff check
        run: ruff check .
      - name: ruff format --check
        run: ruff format --check .
      - name: pytest
        run: pytest --cov=arguslog --cov-report=term

  java:
    name: Java — build + test
    needs: changes
    if: needs.changes.outputs.java == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Build & test
        run: ./gradlew build --stacktrace
      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: gradle-reports
          path: |
            **/build/reports/**
            **/build/test-results/**

  security:
    name: Security — gitleaks + trivy
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # gitleaks-action calls GET /repos/{owner}/{repo}/pulls/{n}/commits to scope its scan to
    # the PR's commits — that requires pull-requests:read, which the default GITHUB_TOKEN
    # doesn't grant. Without this block the action fails with "Resource not accessible by
    # integration" (HTTP 403) on every PR.
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v5
        with:
          # gitleaks-action computes the commit range to scan as <oldest_pr_commit>^..<head>;
          # the default shallow clone (depth=1) doesn't have the parent commit, so the git
          # rev-parse fails with "unknown revision or path not in the working tree". Full
          # history is required.
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          severity: HIGH,CRITICAL
          exit-code: '1'
          ignore-unfixed: true

  openapi-diff:
    name: OpenAPI spec stability
    needs: changes
    if: needs.changes.outputs.openapi == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
      - uses: gradle/actions/setup-gradle@v5
      - name: Regenerate OpenAPI spec
        # OpenApiContractTest hits /v3/api-docs and asserts the result matches the committed
        # services/api/openapi.json byte-for-byte. A drift fails the test and writes the new
        # spec to services/api/build/openapi/openapi.json, which the upload below preserves.
        run: ./gradlew :services:api:test --tests
          "org.arguslog.api.openapi.OpenApiContractTest"
      - name: Verify committed spec matches the api
        if: always()
        run: |
          if [ -f services/api/build/openapi/openapi.json ]; then
            echo "::error::services/api/openapi.json drifted from /v3/api-docs."
            echo "Regenerate locally with:"
            echo "  ARGUSLOG_OPENAPI_WRITE=true ./gradlew :services:api:test --tests org.arguslog.api.openapi.OpenApiContractTest"
            echo "and commit services/api/openapi.json."
            diff -u services/api/openapi.json services/api/build/openapi/openapi.json || true
            exit 1
          fi
      - name: Upload generated spec
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: openapi-spec
          path: |
            services/api/openapi.json
            services/api/build/openapi/openapi.json
