name: Release sdk-react

# Tag-driven npm release. Push a tag matching `sdk-react-v*` and the matching version in
# packages/sdk-react/package.json gets published. sdk-react depends on sdk-browser via
# `workspace:*` — pnpm publish rewrites that to the actual published version, so sdk-browser
# must already be on npm at a version satisfying the constraint before tagging sdk-react.
on:
  push:
    tags:
      - 'sdk-react-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (sdk-react-vX.Y.Z).'
        required: true
      dry-run:
        description: 'Run pnpm publish with --dry-run (no upload).'
        required: false
        default: 'true'

concurrency:
  group: release-sdk-react-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          node scripts/verify-tag-version.mjs \
            "${{ steps.tag.outputs.value }}" \
            sdk-react \
            packages/sdk-react/package.json

      # sdk-react depends on sdk-browser via workspace: protocol — typecheck needs the
      # sdk-browser dist on disk to find type declarations, so build the dep first.
      - name: Build sdk-browser dependency
        run: pnpm --filter @arguslog/sdk-browser build

      - name: Lint, typecheck, test
        run: |
          pnpm --filter @arguslog/sdk-react lint
          pnpm --filter @arguslog/sdk-react typecheck
          pnpm --filter @arguslog/sdk-react test

      - name: Build
        run: pnpm --filter @arguslog/sdk-react build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          pnpm --filter @arguslog/sdk-react publish \
            --access public \
            --no-git-checks \
            --provenance \
            $DRY_RUN_FLAG
