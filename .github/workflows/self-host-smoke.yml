name: Self-host smoke test

# Boot the full docker-compose stack on every push to dev (so the workflow actually fires —
# the previous PR-only trigger never ran because the repo flow is dev→main FF, no PRs) plus
# on PRs that touch infra / compose / any Dockerfile / Keycloak realm. Catches the "works in
# dev but the prod image won't start" class of regressions before merge.
on:
  push:
    branches: [dev]
    paths:
      - 'infra/docker/docker-compose.full.yml'
      - 'services/**/Dockerfile'
      - 'apps/web/Dockerfile'
      - 'apps/web/Caddyfile'
      - 'apps/web/runtime-config.sh'
      - 'apps/landing/Dockerfile'
      - 'apps/landing/Caddyfile'
      - 'packages/mcp-server/Dockerfile'
      - 'services/keycloak/**'
      - '.env.example'
      - '.github/workflows/self-host-smoke.yml'
  pull_request:
    paths:
      - 'infra/docker/docker-compose.full.yml'
      - 'services/**/Dockerfile'
      - 'apps/web/Dockerfile'
      - 'apps/web/Caddyfile'
      - 'apps/web/runtime-config.sh'
      - 'apps/landing/Dockerfile'
      - 'apps/landing/Caddyfile'
      - 'packages/mcp-server/Dockerfile'
      - 'services/keycloak/**'
      - '.env.example'
      - '.github/workflows/self-host-smoke.yml'
  workflow_dispatch:

concurrency:
  group: self-host-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke:
    name: Boot + healthcheck the full stack
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v5

      - name: Seed .env from example
        run: cp .env.example .env

      - name: Build every image in parallel
        run: |
          docker compose -f infra/docker/docker-compose.full.yml build --pull \
            api ingest worker web landing mcp

      - name: Bring up infra first
        # `up --wait` expects every listed service to reach "healthy" — but the bucket-init
        # one-shot has no healthcheck and just exits 0, which `--wait` interprets as never-
        # healthy. Wait for the long-running pieces first, then run init synchronously below.
        run: |
          docker compose -f infra/docker/docker-compose.full.yml up -d --wait \
            postgres redis keycloak minio mailhog

      - name: Create MinIO buckets (one-shot)
        run: |
          docker compose -f infra/docker/docker-compose.full.yml --profile init run --rm \
            minio-bucket-init

      - name: Bring up the JVM + web + landing + mcp services
        run: |
          docker compose -f infra/docker/docker-compose.full.yml up -d --wait \
            api ingest worker web landing mcp

      - name: Verify every health endpoint returns UP
        run: |
          set -euo pipefail
          # name:host_port/path — each one curl'd from the runner via the published host port.
          for svc in 'api:8081/actuator/health/readiness' \
                     'ingest:8080/actuator/health' \
                     'worker:8082/actuator/health' \
                     'web:5173/healthz' \
                     'landing:5175/healthz' \
                     'mcp:8090/healthz' \
                     'keycloak:8180/health/ready'; do
            name="${svc%%:*}"
            path="${svc#*:}"
            echo "→ checking http://localhost:${path}"
            for i in $(seq 1 30); do
              if curl -fsS -o "/tmp/health-$name.json" "http://localhost:${path}"; then
                echo "  ✓ ${name} healthy"
                break
              fi
              if [ "$i" = 30 ]; then
                echo "  ✗ ${name} never came up — logs:"
                docker compose -f infra/docker/docker-compose.full.yml logs "$name" | tail -100
                exit 1
              fi
              sleep 2
            done
          done

      - name: Verify web runtime-config injection
        # Sanity-check that the new entrypoint wrote /srv/runtime-config.js from the env vars.
        # The compose default leaves ARGUSLOG_WEB_* unset so the file should contain empty
        # strings — proves the entrypoint ran without crashing.
        run: |
          set -euo pipefail
          body=$(curl -fsS http://localhost:5173/runtime-config.js)
          echo "$body"
          echo "$body" | grep -q '__ARGUSLOG_CONFIG__' || {
            echo "✗ runtime-config.js missing the __ARGUSLOG_CONFIG__ assignment"
            exit 1
          }

      - name: Tear down
        if: always()
        run: docker compose -f infra/docker/docker-compose.full.yml down -v --remove-orphans
