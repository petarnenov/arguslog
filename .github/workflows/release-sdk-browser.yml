name: Release sdk-browser

# Tag-driven npm release. Push a tag matching `sdk-browser-v*` (e.g. `sdk-browser-v0.1.0`) and the
# matching version in packages/sdk-browser/package.json gets published to npm. Manual dispatch is
# kept for rehearsing the workflow with no real publish (set `dry-run: true`).
on:
  push:
    tags:
      - 'sdk-browser-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (sdk-browser-vX.Y.Z). For dry-runs use any matching tag.'
        required: true
      dry-run:
        description: 'Run pnpm publish with --dry-run (no upload).'
        required: false
        default: 'true'

concurrency:
  group: release-sdk-browser-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      id-token: write # required for npm provenance attestations
    steps:
      - uses: actions/checkout@v5
        with:
          # Pull tags so verify-tag-version can read git data if needed (publish itself uses the
          # tag from the trigger).
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          node scripts/verify-tag-version.mjs \
            "${{ steps.tag.outputs.value }}" \
            sdk-browser \
            packages/sdk-browser/package.json

      - name: Lint, typecheck, test
        run: |
          pnpm --filter @arguslog/sdk-browser lint
          pnpm --filter @arguslog/sdk-browser typecheck
          pnpm --filter @arguslog/sdk-browser test

      - name: Build
        run: pnpm --filter @arguslog/sdk-browser build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          pnpm --filter @arguslog/sdk-browser publish \
            --access public \
            --no-git-checks \
            --provenance \
            $DRY_RUN_FLAG
