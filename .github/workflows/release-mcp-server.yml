name: Release mcp-server

# Tag-driven npm release. Push a tag matching `mcp-server-v*` and the matching version in
# packages/mcp-server/package.json gets published to npm. Standalone — no internal SDK deps,
# but needs services/api/openapi.json present for the codegen step to enumerate tools.
on:
  push:
    tags:
      - 'mcp-server-v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to release (mcp-server-vX.Y.Z).'
        required: true
      dry-run:
        description: 'Run pnpm publish with --dry-run (no upload).'
        required: false
        default: 'true'

concurrency:
  group: release-mcp-server-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, publish
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: pnpm/action-setup@v4
        with:
          version: 9.10.0
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: pnpm
          registry-url: 'https://registry.npmjs.org'

      - run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          node scripts/verify-tag-version.mjs \
            "${{ steps.tag.outputs.value }}" \
            mcp-server \
            packages/mcp-server/package.json

      # sdk-core is a workspace dep (buildSyntheticEvent in the send_test_event handler);
      # tsc needs the resolved .d.ts files on disk before typecheck/test will pass in a clean CI checkout.
      - name: Pre-build sdk-core
        run: pnpm --filter @arguslog/sdk-core build

      - name: Lint, typecheck, test
        run: |
          pnpm --filter @arguslog/mcp-server lint
          pnpm --filter @arguslog/mcp-server typecheck
          pnpm --filter @arguslog/mcp-server test

      - name: Build (codegen + tsc)
        run: pnpm --filter @arguslog/mcp-server build

      - name: Publish to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NODE_AUTH_TOKEN }}
        run: |
          DRY_RUN_FLAG=""
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.dry-run }}" = "true" ]; then
            DRY_RUN_FLAG="--dry-run"
          fi
          pnpm --filter @arguslog/mcp-server publish \
            --access public \
            --no-git-checks \
            --provenance \
            $DRY_RUN_FLAG
