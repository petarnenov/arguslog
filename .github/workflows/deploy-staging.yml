name: Deploy to staging

# Triggers a Railway deploy for each service against the staging environment whenever main
# advances. The Railway GitHub App is the alternative — it deploys per push automatically — but
# this workflow gates deploys on green CI before mutating the staging fleet, which the GitHub
# App does not.
on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (or "all").'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - api
          - ingest
          - worker
          - web

concurrency:
  # Serialize per ref so two pushes in quick succession don't race on the same Railway env. Each
  # service is independent, but Railway's API throttles parallel deploys against one project.
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: false

jobs:
  pick-services:
    name: Decide which services to deploy
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.pick.outputs.services }}
    steps:
      - id: pick
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && \
             [ "${{ github.event.inputs.service }}" != "all" ]; then
            echo 'services=["${{ github.event.inputs.service }}"]' >> "$GITHUB_OUTPUT"
          else
            echo 'services=["api","ingest","worker","web"]' >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Deploy ${{ matrix.service }}
    needs: pick-services
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.pick-services.outputs.services) }}
    steps:
      - uses: actions/checkout@v5

      - name: Install Railway CLI
        # Pin a version for reproducibility — Railway's CLI moves quickly and a silent flag rename
        # would break this workflow without warning.
        run: npm install --global @railway/cli@4.30.2

      - name: Resolve service name
        id: svc
        run: |
          case "${{ matrix.service }}" in
            web) echo "name=arguslog-web" >> "$GITHUB_OUTPUT" ;;
            *)   echo "name=arguslog-${{ matrix.service }}" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Deploy
        env:
          # Project-scoped token from the Railway dashboard (not the account token). Read-only
          # to other projects so a leak doesn't escalate beyond Arguslog.
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN_STAGING }}
        run: |
          # `railway up --detach` queues the build then exits — we don't tail logs from CI to
          # keep the job under the timeout. The Railway dashboard is the source of truth for
          # build progress + rollback.
          railway up \
            --service="${{ steps.svc.outputs.name }}" \
            --environment=staging \
            --ci \
            --detach
