name: arguslog-selfhost

# Full self-host stack — extends the dev infra compose with the JVM + web services.
# Boots from a fresh clone with `docker compose -f infra/docker/docker-compose.full.yml up -d`
# after copying `.env.example` → `.env` at the repo root and editing the secrets.
#
# Profile note: `init` profile only runs once to create the MinIO buckets; nothing else uses
# profiles, so `docker compose up -d --profile init` first, then `docker compose up -d`
# without the profile, OR `docker compose --profile init up -d` (init exits when done).

services:
  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: arguslog-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-arguslog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-arguslog}
      POSTGRES_DB: ${POSTGRES_DB:-arguslog}
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    volumes:
      - arguslog-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-arguslog} -d ${POSTGRES_DB:-arguslog}']
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: arguslog-redis
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - arguslog-redis-data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  keycloak:
    image: quay.io/keycloak/keycloak:25.0
    container_name: arguslog-keycloak
    command:
      - start-dev
      - --import-realm
      - --hostname-strict=false
      - --health-enabled=true
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${ARGUSLOG_INITIAL_ADMIN_EMAIL:-admin@localhost}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${ARGUSLOG_INITIAL_ADMIN_PASSWORD:-admin}
      KC_HTTP_PORT: '8180'
    ports:
      - '${KEYCLOAK_PORT:-8180}:8180'
    volumes:
      - ../../services/keycloak/realm:/opt/keycloak/data/import:ro
      - ../../services/keycloak/themes/arguslog:/opt/keycloak/themes/arguslog:ro
    healthcheck:
      test:
        [
          'CMD-SHELL',
          "exec 3<>/dev/tcp/127.0.0.1/9000 && echo -e 'GET /health/ready HTTP/1.0\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'",
        ]
      interval: 10s
      timeout: 5s
      retries: 30

  minio:
    image: minio/minio:latest
    container_name: arguslog-minio
    command: ['server', '/data', '--console-address', ':9001']
    environment:
      MINIO_ROOT_USER: ${R2_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${R2_SECRET_KEY:-minioadmin}
    ports:
      - '${MINIO_PORT:-9000}:9000'
      - '${MINIO_CONSOLE_PORT:-9001}:9001'
    volumes:
      - arguslog-minio-data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 10

  minio-bucket-init:
    image: minio/mc:latest
    container_name: arguslog-minio-init
    profiles: ['init']
    depends_on:
      minio:
        condition: service_healthy
    entrypoint:
      - /bin/sh
      - -c
      - |
        mc alias set local http://minio:9000 ${R2_ACCESS_KEY:-minioadmin} ${R2_SECRET_KEY:-minioadmin} &&
        (mc mb local/${R2_BUCKET:-arguslog-sourcemaps} || true) &&
        (mc mb local/arguslog-attachments || true) &&
        echo "MinIO buckets ready"

  mailhog:
    image: mailhog/mailhog:latest
    container_name: arguslog-mailhog
    ports:
      - '${MAILHOG_SMTP_PORT:-1025}:1025'
      - '${MAILHOG_UI_PORT:-8025}:8025'

  api:
    build:
      context: ../..
      dockerfile: services/api/Dockerfile
    image: arguslog/api:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-api
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      keycloak: { condition: service_healthy }
      minio: { condition: service_healthy }
    environment:
      # PORT overrides the Dockerfile default (8080). server.port in application.yml reads
      # ${PORT:8081}, so without this override Spring would pick up the Dockerfile's 8080 and
      # the healthcheck below (which hits 8081) would loop forever.
      PORT: '8081'
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-arguslog}
      DATABASE_USER: ${POSTGRES_USER:-arguslog}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-arguslog}
      REDIS_URL: redis://redis:6379
      KEYCLOAK_ISSUER: ${KEYCLOAK_ISSUER:-http://keycloak:8180/realms/arguslog}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      ARGUSLOG_PLATFORM_ADMINS: ${ARGUSLOG_PLATFORM_ADMINS:-${ARGUSLOG_INITIAL_ADMIN_EMAIL:-admin@localhost}}
      ARGUSLOG_DEFAULT_TIER: ${ARGUSLOG_DEFAULT_TIER:-regular}
      R2_ENDPOINT: http://minio:9000
      R2_BUCKET: ${R2_BUCKET:-arguslog-sourcemaps}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-minioadmin}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-minioadmin}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      ARGUSLOG_DSN: ${ARGUSLOG_DSN:-}
      ARGUSLOG_ENVIRONMENT: ${ARGUSLOG_ENVIRONMENT:-self-host}
      ARGUSLOG_RELEASE: ${ARGUSLOG_RELEASE:-2.0.0}
    ports:
      - '${API_PORT:-8081}:8081'
    healthcheck:
      # Spring Boot + Flyway + JPA cold-start on a fresh container takes ~2-3 min on a slow
      # runner; the 60-retry window (10 min total) is wide enough for GitHub Actions while
      # local dev usually goes green inside 1 min anyway.
      test: ['CMD-SHELL', "wget -q -O- http://localhost:8081/actuator/health/readiness | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 60
      start_period: 60s

  ingest:
    build:
      context: ../..
      dockerfile: services/ingest/Dockerfile
    image: arguslog/ingest:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-ingest
    depends_on:
      api: { condition: service_healthy }
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-arguslog}
      DATABASE_USER: ${POSTGRES_USER:-arguslog}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-arguslog}
      REDIS_URL: redis://redis:6379
      ARGUSLOG_DSN: ${ARGUSLOG_DSN:-}
      ARGUSLOG_ENVIRONMENT: ${ARGUSLOG_ENVIRONMENT:-self-host}
      ARGUSLOG_RELEASE: ${ARGUSLOG_RELEASE:-2.0.0}
    ports:
      - '${INGEST_PORT:-8080}:8080'
    healthcheck:
      test: ['CMD-SHELL', "wget -q -O- http://localhost:8080/actuator/health | grep -q UP"]
      interval: 10s
      timeout: 5s
      retries: 30

  worker:
    build:
      context: ../..
      dockerfile: services/worker/Dockerfile
    image: arguslog/worker:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-worker
    depends_on:
      api: { condition: service_healthy }
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-arguslog}
      DATABASE_USER: ${POSTGRES_USER:-arguslog}
      DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-arguslog}
      REDIS_URL: redis://redis:6379
      R2_ENDPOINT: http://minio:9000
      R2_BUCKET: ${R2_BUCKET:-arguslog-sourcemaps}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY:-minioadmin}
      R2_SECRET_KEY: ${R2_SECRET_KEY:-minioadmin}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      ARGUSLOG_DSN: ${ARGUSLOG_DSN:-}
      ARGUSLOG_ENVIRONMENT: ${ARGUSLOG_ENVIRONMENT:-self-host}
      ARGUSLOG_RELEASE: ${ARGUSLOG_RELEASE:-2.0.0}
    # No ports + no healthcheck: worker has only spring-boot-starter-actuator (no -starter-web),
    # so there's no embedded HTTP server to probe. compose treats a service without a healthcheck
    # as ready-when-running, which is the right model for a background Redis-Streams consumer.
    # Liveness in prod is the running process itself; Railway's container-level monitor watches
    # PID 1.

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8081}
        VITE_INGEST_BASE_URL: ${VITE_INGEST_BASE_URL:-http://localhost:8080}
        VITE_KEYCLOAK_URL: ${VITE_KEYCLOAK_URL:-http://localhost:8180}
        VITE_KEYCLOAK_REALM: ${VITE_KEYCLOAK_REALM:-arguslog}
        VITE_KEYCLOAK_CLIENT_ID: ${VITE_KEYCLOAK_CLIENT_ID:-arguslog-web}
        VITE_RELEASE: ${ARGUSLOG_RELEASE:-2.0.0}
    image: arguslog/web:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-web
    depends_on:
      api: { condition: service_healthy }
    environment:
      # Runtime config injection — entrypoint regenerates /srv/runtime-config.js from these.
      # All optional; empty values fall through to the build-time VITE_* args above.
      ARGUSLOG_WEB_API_BASE_URL: ${ARGUSLOG_WEB_API_BASE_URL:-}
      ARGUSLOG_WEB_INGEST_BASE_URL: ${ARGUSLOG_WEB_INGEST_BASE_URL:-}
      ARGUSLOG_WEB_KEYCLOAK_URL: ${ARGUSLOG_WEB_KEYCLOAK_URL:-}
      ARGUSLOG_WEB_KEYCLOAK_REALM: ${ARGUSLOG_WEB_KEYCLOAK_REALM:-}
      ARGUSLOG_WEB_KEYCLOAK_CLIENT_ID: ${ARGUSLOG_WEB_KEYCLOAK_CLIENT_ID:-}
      ARGUSLOG_WEB_DOGFOOD_DSN: ${ARGUSLOG_WEB_DOGFOOD_DSN:-}
      ARGUSLOG_WEB_RELEASE: ${ARGUSLOG_WEB_RELEASE:-${ARGUSLOG_RELEASE:-2.0.0}}
    ports:
      # Container Caddy listens on $PORT (default 8080); fix-was-broken: previous map was 5173:80
      # which never connected since the upstream caddy:alpine image doesn't expose 80.
      - '${WEB_PORT:-5173}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8080/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

  landing:
    build:
      context: ../..
      dockerfile: apps/landing/Dockerfile
    image: arguslog/landing:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-landing
    ports:
      - '${LANDING_PORT:-5175}:8080'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8080/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

  mcp:
    build:
      context: ../..
      dockerfile: packages/mcp-server/Dockerfile
    image: arguslog/mcp-server:${ARGUSLOG_RELEASE:-2.0.0}
    container_name: arguslog-mcp
    depends_on:
      api: { condition: service_healthy }
    environment:
      # MCP server hits the api over the compose network. Per-request PAT auth means there's no
      # shared secret to ship here — operator passes Authorization: Bearer arglog_pat_* on each
      # MCP call from their client.
      PORT: '8090'
      ARGUSLOG_API_URL: http://api:8081
    ports:
      - '${MCP_PORT:-8090}:8090'
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://localhost:8090/healthz || exit 1']
      interval: 10s
      timeout: 5s
      retries: 20

volumes:
  arguslog-postgres-data:
  arguslog-redis-data:
  arguslog-minio-data:
