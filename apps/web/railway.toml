# Railway service config for arguslog-web. Multi-stage Dockerfile builds the SPA with pnpm and
# serves the dist with Caddy (SPA fallback configured via apps/web/Caddyfile).

[build]
builder = "DOCKERFILE"
dockerfilePath = "apps/web/Dockerfile"
watchPatterns = [
  "apps/web/**",
  "packages/sdk-browser/**",
  "packages/sdk-react/**",
  "packages/eslint-config/**",
  "packages/tsconfig/**",
  "pnpm-lock.yaml",
  "pnpm-workspace.yaml",
]

[deploy]
healthcheckPath = "/healthz"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
numReplicas = 1
