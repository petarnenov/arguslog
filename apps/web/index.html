<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/arguslog.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light dark" />
    <title>Arguslog</title>
  </head>
  <body>
    <div id="root"></div>
    <!-- Runtime config: regenerated by the container entrypoint from ARGUSLOG_WEB_* env vars.
         Must load BEFORE the main bundle so env.ts can read window.__ARGUSLOG_CONFIG__ at
         import time. Caddy serves it no-cache so a container restart takes effect on the
         next page load. -->
    <script src="/runtime-config.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
