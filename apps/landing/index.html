<!doctype html>
<html lang="en">

    <meta name="color-scheme" content="light dark" />

    <meta
      name="description"

    />

      property="og:description"
      content="Less dashboard, more dialogue — error tracking, designed for agents."
    />

    <meta property="og:image:alt" content="Arguslog — Less Dashboard, More Dialogue" />

    <meta name="twitter:title" content="Arguslog — error tracking, designed for agents" />

      name="twitter:description"
      content="Less dashboard, more dialogue — error tracking, designed for agents."
    />
    <meta name="twitter:image" content="https://arguslog.org/og-card.png" />
