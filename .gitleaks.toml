# Gitleaks config — extends the default ruleset, adds a global allowlist for
# test fixtures whose entire purpose is to look like a secret so the SDK's
# scrubber regexes have something to match.
#
# Without this, every PR that touches a scrubber test file re-trips the
# default `generic-api-key` rule, blocking the Security check on the PR
# workflow even when no real credential is present.

title = "Arguslog gitleaks config"

[extend]
# Inherit every rule from the upstream default config; we're only widening
# the allowlist, not turning off detection.
useDefault = true

[allowlist]
description = "SDK test fixtures + django-todo demo placeholder Stripe key"
paths = [
  '''python-sdk/tests/.*\.py''',
  '''python-sdk/examples/django-todo/todos/views\.py''',
  '''packages/sdk-core/src/__tests__/.*''',
  '''packages/sdk-browser/src/__tests__/.*''',
  '''packages/sdk-node/src/__tests__/.*''',
  '''java-sdk/src/test/.*''',
]
# The django-todo demo hardcodes a placeholder shaped like a real
# Stripe live-mode key (the prefix you would expect, followed by 16
# uppercase ASCII letters) to show how the scrubber would treat it.
# Allowlisted via the path glob above so gitleaks doesn't trip on
# the demo file; real operators replace the placeholder with their
# own key from env at deploy time. (The literal placeholder string
# is intentionally not quoted here so this very config file doesn't
# trigger the Stripe rule on the scanner that reads it.)
